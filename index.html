<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mon site</title>

  <meta name="theme-color" content="#000000">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #000000;
    }

    img {
      max-width: 100%;
      height: auto;
    }
  </style>
</head>

<body>

  <img src="site_coming_soon.jpg" alt="Site coming soon">

  <!-- Audio invisible -->
  <audio id="music" loop>
    <source src="son_pour_le_site1.mp3" type="audio/mpeg">
  </audio>

  <script>
    document.addEventListener('click', () => {
      const audio = document.getElementById('music');
      audio.play();
    }, { once: true });
  </script>

</body>
</html>
